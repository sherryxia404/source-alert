name: Monitor sources

on:
  schedule:
    # GitHub cron uses UTC. Ten minutes is frequent enough for personal alerts
    # while staying friendly to the public sites being monitored.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      send_test_notification:
        description: Send a direct test notification to the phone
        type: boolean
        default: false
      simulate_source_update:
        description: Simulate a real webpage update through the full monitor
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: source-alert-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_PATH: data/source_alert.sqlite3

    steps:
      - name: Check out repository and saved state
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify notification connection
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_notification }}
        run: python source_alert.py --test-notification

      - name: Simulate a real webpage update
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.simulate_source_update }}
        run: |
          mkdir -p .source-alert-test
          printf '<html><head><title>SourceAlert Test</title></head><body><main>Test page version 1</main></body></html>\n' > .source-alert-test/test-page.html
          python -m http.server 8765 --directory .source-alert-test > /tmp/source-alert-test-server.log 2>&1 &
          TEST_SERVER_PID=$!
          trap 'kill "$TEST_SERVER_PID"' EXIT
          sleep 1

          rm -f data/source_alert_test.sqlite3
          DATABASE_PATH=data/source_alert_test.sqlite3 python source_alert.py --once --config test_sources.yaml

          printf '<html><head><title>SourceAlert Test</title></head><body><main>Test page version 2 — change detected</main></body></html>\n' > .source-alert-test/test-page.html
          DATABASE_PATH=data/source_alert_test.sqlite3 python source_alert.py --once --config test_sources.yaml
          rm -f data/source_alert_test.sqlite3

      - name: Check sources once
        run: python source_alert.py --once

      - name: Keep scheduled monitoring active
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            date -u +%Y-%m > data/heartbeat
          fi

      - name: Save state only when sources changed
        run: |
          git config user.name "source-alert[bot]"
          git config user.email "source-alert[bot]@users.noreply.github.com"
          git add -f data/source_alert.sqlite3
          if [ -f data/heartbeat ]; then
            git add -f data/heartbeat
          fi
          if git diff --cached --quiet; then
            echo "No source changes; nothing to save."
          else
            git commit -m "chore: save monitor state [skip ci]"
            git push
          fi
